

services:
  redis:
    image: redis:alpine
    container_name: jobqueue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:18-alpine
    container_name: jobqueue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: jobqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: JobQueueTask.Api/Dockerfile
    container_name: jobqueue-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=jobqueue;Username=postgres;Password=yourpassword
      - ConnectionStrings__redis=redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: